<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meu Canal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: #0f0f0f;
    color: #fff;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: #181818;
    position: sticky;
    top: 0;
}

.logo {
    font-size: 20px;
    font-weight: bold;
}

#dataHora {
    font-size: 14px;
}

/* BOTÃ•ES REDES */
.social {
    padding: 15px;
}

.social a {
    margin-right: 10px;
    padding: 8px 12px;
    background: #272727;
    border-radius: 20px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.social a:hover {
    background: red;
}

/* BANNER */
.banner img {
    width: 100%;
    border-radius: 10px;
}

/* INFO CANAL */
.channel-info {
    padding: 15px;
}

/* BUSCA */
.search {
    padding: 15px;
}

.search input {
    width: 100%;
    padding: 12px;
    border-radius: 30px;
    border: none;
    outline: none;
}

/* SEÃ‡Ã•ES */
.section {
    padding: 15px;
}

.section h2 {
    margin-bottom: 10px;
}

/* CARDS */
.cards {
    display: flex;
    gap: 10px;
    overflow-x: auto;
}

.card {
    min-width: 180px;
    background: #1f1f1f;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
}

.card p {
    padding: 10px;
    font-size: 14px;
}

/* BOTÃƒO */
.btn {
    margin-top: 10px;
    padding: 10px;
    background: red;
    border: none;
    border-radius: 5px;
    color: white;
    cursor: pointer;
}

/* DOWNLOAD */
.download a {
    display: block;
    background: #1f1f1f;
    margin-bottom: 8px;
    padding: 10px;
    border-radius: 5px;
    text-decoration: none;
    color: white;
}

/* RESPONSIVO */
@media (max-width: 600px) {
    .card {
        min-width: 140px;
    }
}
</style>

</head>

<body>

<header>
    <div class="logo">MEU CANAL</div>
    <div id="dataHora"></div>
</header>

<!-- REDES -->
<div class="social">
    <a href="#">https://www.youtube.com/@EuFernandesTech</a>

</div>

<!-- BANNER -->
<div class="banner">
    <img src="https://via.placeholder.com/1200x300">
</div>

<!-- INFO -->
<div class="channel-info">
    <h2>Eu Fernandes</h2>
    <p>52.070 inscritos</p>
</div>

<!-- BUSCA -->
<div class="search">
    <input type="text" id="busca" placeholder="Pesquisar vÃ­deos, playlists..." onkeyup="buscar()">
</div>

<!-- MAIS ACESSADOS -->
<div class="section">
    <h2>ðŸ”¥ Mais Acessados</h2>
    <div class="cards">
        <div class="card"><img src="https://via.placeholder.com/300"><p>VÃ­deo 1</p></div>
        <div class="card"><img src="https://via.placeholder.com/300"><p>VÃ­deo 2</p></div>
    </div>
</div>

<!-- RECENTES -->
<div class="section">
    <h2>ðŸ†• VÃ­deos Recentes</h2>
    <div class="cards">
        <div class="card"><img src="https://via.placeholder.com/300"><p>VÃ­deo Novo</p></div>
    </div>
</div>

<!-- PLAYLIST -->
<div class="section">
    <h2>ðŸ“‚ Playlists</h2>
    <div class="cards">
        <div class="card"><img src="https://via.placeholder.com/300"><p>Playlist</p></div>
    </div>
    <button class="btn">Ver todas</button>
</div>

<!-- PRODUTOS -->
<div class="section">
    <h2>ðŸ›’ Produtos</h2>
    <div class="cards">
        <div class="card"><img src="https://via.placeholder.com/300"><p>Produto</p></div>
    </div>
</div>

<!-- DOWNLOAD -->
<div class="section download">
    <h2>â¬‡ Downloads</h2>
    <a href="#">Baixar App 1</a>
</div>

<!-- COMENTÃRIOS -->
<div class="section">
    <h2>ðŸ’¬ ComentÃ¡rios</h2>
    <div id="disqus_thread"></div>
</div>

<script>
// DATA E HORA
function atualizarData() {
    const agora = new Date();
    document.getElementById("dataHora").innerHTML =
        agora.toLocaleDateString() + " " + agora.toLocaleTimeString();
}
setInterval(atualizarData, 1000);

// BUSCA
function buscar() {
    let input = document.getElementById("busca").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        let texto = card.innerText.toLowerCase();
        card.style.display = texto.includes(input) ? "block" : "none";
    });
}

// DISQUS
(function() {
var d = document, s = d.createElement('script');
s.src = 'https://SEU-DISQUS.disqus.com/embed.js';
s.setAttribute('data-timestamp', +new Date());
(d.head || d.body).appendChild(s);
})();
</script>

</body>
</html>
